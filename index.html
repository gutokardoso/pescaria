<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pescaria</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, html, body {
      width: 100%;
      min-height: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #9de8ff 0%, #2b9bd8 45%, #00689b 100%);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      color: #ffffff;
      padding: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #dff8ff;
      font-family: Arial, Helvetica, sans-serif;
      color: #06345d;
      touch-action: none;
      user-select: none;
    }
    .game-shell {
      position: relative;
      width: min(100vw, 520px);
      height: min(100dvh, 920px);
      min-height: 100dvh;
      aspect-ratio: auto;
      background: linear-gradient(to bottom, #8ee7ff 0 15%, #3bb7e6 15% 25%, #0479b9 25% 100%);
      overflow: hidden;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 30, 60, 0.45);
      touch-action: none;
      user-select: none;
    }
    .world {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 3300px;
      will-change: transform;
      z-index: 1;
    }
    .sky-image {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 280px;
      background-image: url('./assets/sky.png');
      background-size: cover;
      background-position: center top;
      z-index: 1;
    }
    .sea-background {
      position: absolute;
      left: 0;
      top: 220px;
      width: 100%;
      height: 3080px;
      background-image: url('./assets/sea-bg.png');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center top;
      z-index: 0;
    }
    .boat-wrap {
      position: absolute;
      top: 68px;
      left: 50%;
      width: 380px;
      height: 190px;
      transform: translateX(-50%);
      z-index: 8;
      background-image: url('./assets/boat.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation: boatFloat 2s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes boatFloat {
      from { transform: translateX(-50%) translateY(-3px) rotate(-0.7deg); }
      to { transform: translateX(-50%) translateY(5px) rotate(0.7deg); }
    }
    .tackle-layer {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }
    #lineSvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    #fishingLine {
      stroke: rgba(9, 43, 61, 0.66);
      stroke-width: 2.2;
      stroke-linecap: round;
      filter: drop-shadow(0 1px 2px rgba(255,255,255,0.35));
    }
    .hook {
      position: absolute;
      width: 52px;
      height: 72px;
      background-image: url('./assets/hook.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border: 0;
      border-radius: 0;
      z-index: 40;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.22));
    }
    
    
    .fish {
      position: absolute;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 5;
      will-change: transform, left, top;
      filter: drop-shadow(0 5px 6px rgba(0,60,100,0.18));
    }
    .fish.normal {
      width: 72px;
      height: 54px;
      background-image: url('./assets/fish-normal.png');
    }
    .fish.baiacu {
      width: 76px;
      height: 76px;
      background-image: url('./assets/fish-baiacu.png');
      filter: drop-shadow(0 0 10px rgba(255,120,0,0.45)) drop-shadow(0 5px 6px rgba(0,60,100,0.18));
    }

    .fish.gold {
      width: 82px;
      height: 58px;
      background-image: url('./assets/fish-gold.png');
      filter: drop-shadow(0 0 10px rgba(255,214,36,0.65)) drop-shadow(0 5px 6px rgba(0,60,100,0.18));
    }
    .fish.caught {
      opacity: 0;
      transform: scale(0.25) !important;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    .hud {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: calc(env(safe-area-inset-left, 0px) + 10px);
      right: calc(env(safe-area-inset-right, 0px) + 10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      z-index: 999;
      pointer-events: none;
      flex-wrap: nowrap;
    }
    .hud-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 119, 182, 0.2);
      border-radius: 999px;
      padding: 7px 9px;
      font-weight: 900;
      font-size: clamp(10px, 2.7vw, 14px);
      color: #00557d;
      text-shadow: none;
      white-space: nowrap;
      box-shadow: 0 6px 18px rgba(0, 70, 120, 0.16);
      min-width: 0;
    }
    
    .instructions {
      position: absolute;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      transform: translateX(-50%);
      z-index: 999;
      width: calc(100% - 24px);
      text-align: center;
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 900;
      color: rgba(255,255,255,0.98);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      pointer-events: none;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 72, 120, 0.32);
      backdrop-filter: blur(5px);
    }
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
      background: rgba(218,248,255,0.64);
      backdrop-filter: blur(8px);
    }
    .panel {
      width: 100%;
      max-width: 390px;
      border-radius: 30px;
      background: rgba(255,255,255,0.94);
      color: #034870;
      padding: 28px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,100,150,0.25);
      border: 1px solid rgba(255,255,255,0.9);
    }
    .panel h1 {
      font-size: 38px;
      line-height: 1;
      margin-bottom: 12px;
      color: #0077c8;
      text-shadow: 0 3px 0 rgba(0,80,160,0.14);
    }
    .panel p {
      font-size: 16px;
      line-height: 1.45;
      margin-bottom: 18px;
      color: #2b617d;
    }
    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 18px 0 22px;
    }
    .score-box {
      background: #e8f9ff;
      border-radius: 18px;
      padding: 12px 8px;
      font-weight: 900;
      color: #00557d;
      border: 1px solid #c8efff;
    }
    .score-box span {
      display: block;
      font-size: 12px;
      color: #5090aa;
      margin-bottom: 5px;
    }
    button {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #a9e83f, #52bc16);
      color: white;
      font-weight: 900;
      font-size: 18px;
      padding: 15px 28px;
      cursor: pointer;
      text-shadow: 0 2px 3px rgba(0,80,20,0.3);
      box-shadow: 0 9px 0 #2e8b0d, 0 16px 30px rgba(70,180,20,0.28);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    button:active { transform: translateY(5px); box-shadow: 0 4px 0 #2e8b0d, 0 10px 20px rgba(70,180,20,0.22); }
    .hidden { display: none; }
    @media (max-width: 560px) {
      .game-shell {
        width: 100vw;
        height: 100dvh;
        min-height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }

      .panel h1 {
        font-size: 32px;
      }

      .hud {
        top: calc(env(safe-area-inset-top, 0px) + 12px);
      }

      .instructions {
        bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      }
    }
  
    .start-logo {
      width: min(100%, 340px);
      display: block;
      margin: 0 auto 14px auto;
    }
  
    .score-pop {
      position: absolute;
      width: 82px;
      height: auto;
      z-index: 120;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.65);
      opacity: 0;
      animation: scorePop 0.65s ease-out forwards;
      filter: drop-shadow(0 6px 10px rgba(0, 40, 80, 0.28));
    }

    @keyframes scorePop {
      0% {
        opacity: 0;
        transform: translate(-50%, -45%) scale(0.55);
      }
      22% {
        opacity: 1;
        transform: translate(-50%, -68%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -105%) scale(0.82);
      }
    }

  
    .results-title-img {
      width: min(100%, 420px);
      display: block;
      margin: 0 auto 10px auto;
      filter: drop-shadow(0 6px 18px rgba(255, 196, 0, 0.28));
    }
  
    .fish.rainbow {
      width: 96px;
      height: 60px;
      background-image: url('./assets/fish-rainbow.png');
      filter: drop-shadow(0 0 14px rgba(93, 214, 255, 0.75)) drop-shadow(0 5px 6px rgba(0,60,100,0.18));
    }

    .hook.flash {
      animation: hookFlash 0.28s ease-out;
    }

    @keyframes hookFlash {
      0% { filter: drop-shadow(0 0 0 rgba(255,255,255,0)) drop-shadow(0 4px 6px rgba(0,0,0,0.22)); transform: scale(1); }
      40% { filter: drop-shadow(0 0 16px rgba(255,255,255,0.95)) drop-shadow(0 0 22px rgba(93,214,255,0.9)); transform: scale(1.13); }
      100% { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.22)); transform: scale(1); }
    }

    .freeze-banner {
      position: absolute;
      left: 50%;
      top: 18%;
      transform: translate(-50%, -50%) scale(0.85);
      z-index: 140;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffffff, #9bf6ff, #bdb2ff);
      color: #00557d;
      font-weight: 900;
      font-size: clamp(16px, 4vw, 25px);
      box-shadow: 0 12px 30px rgba(0, 120, 180, 0.25);
      pointer-events: none;
      animation: freezeBanner 0.9s ease-out forwards;
    }

    @keyframes freezeBanner {
      0% { opacity: 0; transform: translate(-50%, -30%) scale(0.75); }
      25% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(0.92); }
    }

    .combo-pop {
      position: absolute;
      z-index: 130;
      left: 50%;
      top: 30%;
      transform: translate(-50%, -50%) scale(0.7);
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff9b0, #ffb300);
      color: #6b3100;
      font-weight: 900;
      font-size: clamp(18px, 5vw, 30px);
      text-shadow: 0 2px 0 rgba(255,255,255,0.45);
      box-shadow: 0 10px 28px rgba(255, 193, 7, 0.35);
      pointer-events: none;
      opacity: 0;
      animation: comboPop 0.75s ease-out forwards;
    }

    @keyframes comboPop {
      0% { opacity: 0; transform: translate(-50%, -35%) scale(0.65); }
      25% { opacity: 1; transform: translate(-50%, -55%) scale(1.08); }
      100% { opacity: 0; transform: translate(-50%, -90%) scale(0.9); }
    }

    .particle {
      position: absolute;
      z-index: 115;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff48a;
      pointer-events: none;
      animation: particleBurst 0.65s ease-out forwards;
    }

    @keyframes particleBurst {
      from { opacity: 1; transform: translate(0, 0) scale(1); }
      to { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
    }

  
    .rainbow-notice {
      position: absolute;
      left: 50%;
      top: 47%;
      width: min(72%, 300px);
      height: auto;
      z-index: 160;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.72);
      opacity: 0;
      animation: rainbowNoticePop 2.15s ease-out forwards;
      filter: drop-shadow(0 10px 24px rgba(0, 60, 120, 0.26));
    }

    @keyframes rainbowNoticePop {
      0% { opacity: 0; transform: translate(-50%, -42%) scale(0.72); }
      12% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      78% { opacity: 1; transform: translate(-50%, -52%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -62%) scale(0.9); }
    }

  
    .depth-progress {
      position: absolute;
      top: 84px;
      right: 10px;
      width: 12px;
      height: calc(100% - 160px);
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.7);
      overflow: hidden;
      z-index: 999;
      box-shadow: 0 0 18px rgba(0,140,255,0.25);
      pointer-events: none;
    }

            .depth-progress-fill {
      position: absolute;
      left: 0;
      width: 100%;
      height: 0%;
      border-radius: 999px;
      background: linear-gradient(to top, #00cfff, #89f7ff, #ffffff);
      transition: height 0.08s linear;
      box-shadow: 0 0 12px rgba(0,220,255,0.7);
    }

</style>
  <link rel="icon" type="image/png" href="./assets/fish-gold.png">
</head>
<body>
  <main class="game-shell" id="game">
    
      <div class="depth-progress">
        <div class="depth-progress-fill" id="depthProgressFill"></div>
      </div>

      <div class="world" id="world">
      <div class="sky-image"></div>
      <div class="sea-background"></div>
      <div class="boat-wrap" id="boat"></div>
    </div>

    <div class="tackle-layer">
      <svg id="lineSvg" aria-hidden="true"><line id="fishingLine" x1="0" y1="0" x2="0" y2="0" /></svg>
      <div class="hook" id="hook"></div>
    </div>

    <div class="hud">
      <div class="hud-card">Pontos: <span id="liveScore">0</span></div>
      <div class="hud-card">Peixes: <span id="liveFish">0</span></div>
      
    </div>

    <div class="instructions" id="instructions">Arraste para os lados e para cima/baixo para controlar o anzol</div>

    <div class="overlay" id="startOverlay">
      <div class="panel">
        <img class="start-logo" src="./assets/logo-pescaria.png" alt="Pescaria - Aventura no Mar" />
        <p>Mova o anzol para os lados para pegar os peixes no caminho.<br><strong>Peixes dourados valem 100 pontos!</strong><br>Cuidado com o baiacu! Ele tira 50 pontos.</p>
        <button id="startBtn">Jogar agora</button>
      </div>
    </div>

    <div class="overlay hidden" id="resultOverlay">
      <div class="panel">
        <img
            class="results-title-img"
            id="resultTitleImage"
            src="./assets/resultado-fartura.png"
            alt="Resultado Final"
          />
        <p>Contagem final dos peixinhos:</p>
        <div class="score-grid">
          <div class="score-box"><span>Comuns</span><strong id="normalCount">0</strong></div>
          <div class="score-box"><span>Dourados</span><strong id="goldCount">0</strong></div>
          <div class="score-box"><span>Total</span><strong id="finalScore">0</strong></div>
        </div>
        <button id="restartBtn">Jogar de novo</button>
      </div>
    </div>
  </main>

  <script>
    const game = document.getElementById('game');
    const world = document.getElementById('world');
    const hook = document.getElementById('hook');
    const fishingLine = document.getElementById('fishingLine');
    const liveScore = document.getElementById('liveScore');
    const liveFish = document.getElementById('liveFish');
    const depthMeter = document.getElementById('depthMeter');
    const startOverlay = document.getElementById('startOverlay');
    const resultOverlay = document.getElementById('resultOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const normalCountEl = document.getElementById('normalCount');
    const goldCountEl = document.getElementById('goldCount');
    const depthProgressFill = document.getElementById('depthProgressFill');
    const finalScoreEl = document.getElementById('finalScore');

    let gameWidth = 0;
    let gameHeight = 0;
    let hookWorldX = 0;
    let hookWorldY = 0;
    let targetX = 0;
    let hookVisualOffsetY = 0;
    let targetVisualOffsetY = 0;
    let verticalControlActive = false;
    let cameraY = 0;
    let state = 'idle';
    let animationId = null;
    let fishes = [];
    let score = 0;
    let normalCaught = 0;
    let goldCaught = 0;
    let comboStreak = 0;
    let lastMultiplier = 1;
    let freezeTimer = 0;
    let freezeSpawnTimer = 0;
    let lastTime = 0;

    const config = {
      rodTipXRatio: 0.75,
      rodTipY: 92,
      startY: 245,
      endY: 250,
      maxDepth: 2860,
      cameraLimit: 2380,
      downSpeed: 620,
      upSpeed: 145,
      verticalEase: 0.18,
      verticalControlRange: 340,
      horizontalEase: 0.2,
      fishCount: 30,
      rainbowChance: 0.08,
      baiacuChance: 0.20,
      hookCollisionRadius: 36
    };

    function resize() {
      const rect = game.getBoundingClientRect();
      gameWidth = rect.width;
      gameHeight = rect.height;
      if (state === 'idle' || state === 'result') {
        hookWorldX = gameWidth * config.rodTipXRatio;
        hookWorldY = config.startY;
        targetX = hookWorldX;
        cameraY = 0;
        renderAll();
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function spawnFishes() {
      fishes.forEach(fish => fish.el.remove());
      fishes = [];
      const minY = 420;
      const maxY = config.maxDepth - 260;

      for (let i = 0; i < config.fishCount; i++) {
        const fishRoll = Math.random();
        const fishType =
          i < 2
            ? 'baiacu'
            : fishRoll < config.rainbowChance
              ? 'rainbow'
              : fishRoll < config.rainbowChance + config.baiacuChance
                ? 'baiacu'
                : fishRoll < config.rainbowChance + config.baiacuChance + 0.22
                  ? 'gold'
                  : 'normal';

        const el = document.createElement('div');
        el.className = `fish ${fishType}`;
        world.appendChild(el);

        const dir = Math.random() > 0.5 ? 1 : -1;
        const width = fishType === 'gold' ? 82 : fishType === 'baiacu' ? 76 : fishType === 'rainbow' ? 96 : 72;
        const height = fishType === 'gold' ? 58 : fishType === 'baiacu' ? 76 : fishType === 'rainbow' ? 60 : 54;
        const x = dir === 1 ? -140 - Math.random() * 380 : gameWidth + 140 + Math.random() * 380;
        const y = minY + Math.random() * (maxY - minY);
        const speed = (50 + Math.random() * 95) * dir;

        fishes.push({
          el,
          x,
          y,
          speed,
          dir,
          width,
          height,
          type: fishType,
          value:
            fishType === 'gold'
              ? 100
              : fishType === 'baiacu'
                ? -50
                : fishType === 'rainbow'
                  ? 0
                  : 50,
          caught: false
        });
      }
    }


    function spawnBonusFish() {
      const fishType = Math.random() < 0.35 ? 'gold' : 'normal';
      const el = document.createElement('div');
      el.className = `fish ${fishType}`;
      world.appendChild(el);

      const dir = Math.random() > 0.5 ? 1 : -1;
      const width = fishType === 'gold' ? 82 : 72;
      const height = fishType === 'gold' ? 58 : 54;
      const screenY = 150 + Math.random() * (gameHeight - 260);
      const y = cameraY + screenY;
      const x = dir === 1 ? -120 : gameWidth + 120;
      const speed = (90 + Math.random() * 120) * dir;

      fishes.push({
        el,
        x,
        y,
        speed,
        dir,
        width,
        height,
        type: fishType,
        value: fishType === 'gold' ? 100 : 50,
        caught: false,
        bonus: true
      });
    }

    function updateFishes(dt) {
      fishes.forEach(fish => {
        if (fish.caught) return;
        fish.x += fish.speed * dt;

        if (fish.dir === 1 && fish.x > gameWidth + 140) {
          fish.x = -150;
        }
        if (fish.dir === -1 && fish.x < -160) {
          fish.x = gameWidth + 150;
        }

        const flip = fish.dir === -1 ? ' scaleX(-1)' : '';
        fish.el.style.left = `${fish.x}px`;
        fish.el.style.top = `${fish.y}px`;
        fish.el.style.transform = flip.trim();
      });
    }

    function updateCamera() {
      const desired = hookWorldY - gameHeight * 0.55;
      cameraY = clamp(desired, 0, config.cameraLimit);
    }

    function renderAll() {
      updateCamera();
      world.style.transform = `translateY(${-cameraY}px)`;

      const rodTipX = gameWidth * config.rodTipXRatio;
      const rodTipScreenY = config.rodTipY - cameraY;
      const hookScreenX = hookWorldX;
      const baseHookScreenY = hookWorldY - cameraY;
      const hookScreenY = baseHookScreenY + hookVisualOffsetY;

      fishingLine.setAttribute('x1', rodTipX.toFixed(1));
      fishingLine.setAttribute('y1', rodTipScreenY.toFixed(1));
      fishingLine.setAttribute('x2', hookScreenX.toFixed(1));
      fishingLine.setAttribute('y2', hookScreenY.toFixed(1));

      hook.style.left = `${hookScreenX - 14}px`;
      hook.style.top = `${hookScreenY}px`;
      let depthPercent = 0;

      if (state === 'down') {
        depthPercent = Math.max(0, Math.min(1,
          (hookWorldY - config.startY) / (config.maxDepth - config.startY)
        ));

        if (depthProgressFill) {
          depthProgressFill.style.top = 'auto';
          depthProgressFill.style.bottom = '0';
          depthProgressFill.style.height = `${depthPercent * 100}%`;
        }
      } else {
        depthPercent = Math.max(0, Math.min(1,
          (hookWorldY - config.endY) / (config.maxDepth - config.endY)
        ));

        if (depthProgressFill) {
          depthProgressFill.style.top = '0';
          depthProgressFill.style.bottom = 'auto';
          depthProgressFill.style.height = `${depthPercent * 100}%`;
        }
      }
    }



    let audioCtx = null;

    function playTone(frequency, duration = 0.08, type = 'sine', volume = 0.06) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscillator.type = type;
        oscillator.frequency.value = frequency;
        gain.gain.value = volume;
        oscillator.connect(gain);
        gain.connect(audioCtx.destination);
        oscillator.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        oscillator.stop(audioCtx.currentTime + duration);
      } catch {}
    }

    function playCatchSound(value) {
      if (value < 0) {
        playTone(170, 0.12, 'sawtooth', 0.05);
      } else if (value >= 100) {
        playTone(880, 0.08, 'triangle', 0.06);
        setTimeout(() => playTone(1180, 0.08, 'triangle', 0.05), 70);
      } else {
        playTone(620, 0.07, 'sine', 0.05);
      }
    }

    function flashHook() {
      hook.classList.remove('flash');
      void hook.offsetWidth;
      hook.classList.add('flash');
      setTimeout(() => hook.classList.remove('flash'), 320);
    }

    function showParticles(x, y, value) {
      const count = value >= 100 ? 18 : value < 0 ? 10 : 12;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        p.style.background = value < 0 ? '#ff4b4b' : value >= 100 ? '#fff27a' : '#7ff6ff';
        const angle = Math.random() * Math.PI * 2;
        const distance = 28 + Math.random() * 42;
        p.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
        game.appendChild(p);
        setTimeout(() => p.remove(), 700);
      }
    }

    function getComboMultiplier() {
      if (comboStreak >= 5) return 3;
      if (comboStreak >= 3) return 2;
      return 1;
    }

    function showComboPop(multiplier) {
      if (multiplier <= 1 || multiplier === lastMultiplier) return;
      lastMultiplier = multiplier;
      const pop = document.createElement('div');
      pop.className = 'combo-pop';
      pop.textContent = `COMBO x${multiplier}!`;
      game.appendChild(pop);
      setTimeout(() => pop.remove(), 800);
    }

    function showFreezeBanner() {
      const img = document.createElement('img');
      img.className = 'rainbow-notice';
      img.src = './assets/aviso-arcoiris.png';
      img.alt = 'Peixe Arco-íris! Subida pausada! 5 segundos';
      game.appendChild(img);
      setTimeout(() => img.remove(), 2200);
    }

    function showScorePop(value, x, y) {
      const img = document.createElement('img');
      img.className = 'score-pop';
      if (value === 100) {
        img.src = './assets/score-100.png';
      } else if (value === -50) {
        img.src = './assets/score-minus-50.png';
      } else {
        img.src = './assets/score-50.png';
      }
      img.alt = `+${value} pontos`;
      img.style.left = `${x}px`;
      img.style.top = `${y}px`;
      game.appendChild(img);
      setTimeout(() => img.remove(), 700);
    }

    function checkCollisions() {
      const visualHookWorldY = hookWorldY + hookVisualOffsetY;
      fishes.forEach(fish => {
        if (fish.caught) return;
        const fishCenterX = fish.x + fish.width / 2;
        const fishCenterY = fish.y + fish.height / 2;
        const dx = hookWorldX - fishCenterX;
        const dy = visualHookWorldY - fishCenterY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < config.hookCollisionRadius) {
          fish.caught = true;
          fish.el.classList.add('caught');

          const popX = hookWorldX;
          const popY = (hookWorldY + hookVisualOffsetY) - cameraY;
          flashHook();

          if (fish.type === 'rainbow') {
            freezeTimer += 5;
            freezeSpawnTimer = 0;
            comboStreak += 1;
            showFreezeBanner();
            showParticles(popX, popY, 100);
            playTone(980, 0.09, 'triangle', 0.06);
            setTimeout(() => playTone(1320, 0.1, 'triangle', 0.05), 80);
          } else {
            let earnedValue = fish.value;
            if (fish.value > 0) {
              comboStreak += 1;
              const multiplier = getComboMultiplier();
              earnedValue = Math.round(fish.value * multiplier);
              showComboPop(multiplier);
            } else {
              comboStreak = 0;
              lastMultiplier = 1;
            }

            score += earnedValue;
            showScorePop(fish.value, popX, popY);
            showParticles(popX, popY, earnedValue);
            playCatchSound(fish.value);
          }

          if (fish.type === 'gold') {
            goldCaught += 1;
          } else if (fish.type === 'normal') {
            normalCaught += 1;
          }
          updateHud();
        }
      });
    }

    function updateHud() {
      liveScore.textContent = score;
      liveFish.textContent = normalCaught + goldCaught;
    }

    function update(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = Math.min((timestamp - lastTime) / 1000, 0.033);
      lastTime = timestamp;

      hookWorldX += (targetX - hookWorldX) * config.horizontalEase;
      hookWorldX = clamp(hookWorldX, 22, gameWidth - 22);

      if (state === 'down') {
        hookWorldY += config.downSpeed * dt;
        hookVisualOffsetY = 0;
        targetVisualOffsetY = 0;
        if (hookWorldY >= config.maxDepth) {
          hookWorldY = config.maxDepth;
          state = 'up';
        }
      } else if (state === 'up') {
        if (freezeTimer > 0) {
          freezeTimer = Math.max(0, freezeTimer - dt);
          freezeSpawnTimer += dt;
          if (freezeSpawnTimer >= 0.45) {
            freezeSpawnTimer = 0;
            spawnBonusFish();
          }
        } else {
          hookWorldY -= config.upSpeed * dt;
        }

        if (verticalControlActive) {
          targetVisualOffsetY = clamp(targetVisualOffsetY, -config.verticalControlRange, config.verticalControlRange);
          hookVisualOffsetY += (targetVisualOffsetY - hookVisualOffsetY) * config.verticalEase;
        } else {
          hookVisualOffsetY += (0 - hookVisualOffsetY) * config.verticalEase;
          targetVisualOffsetY = hookVisualOffsetY;
        }

        checkCollisions();
        if (hookWorldY <= config.endY) {
          hookWorldY = config.endY;
          finishRound();
          return;
        }
      }

      updateFishes(dt);
      renderAll();
      animationId = requestAnimationFrame(update);
    }

    function startRound() {
      cancelAnimationFrame(animationId);
      resize();
      score = 0;
      normalCaught = 0;
      goldCaught = 0;
      comboStreak = 0;
      lastMultiplier = 1;
      freezeTimer = 0;
      freezeSpawnTimer = 0;
      updateHud();
      hookWorldX = gameWidth * config.rodTipXRatio;
      targetX = hookWorldX;
      hookWorldY = config.startY;
      hookVisualOffsetY = 0;
      targetVisualOffsetY = 0;
      verticalControlActive = false;
      cameraY = 0;
      state = 'down';
      lastTime = 0;
      startOverlay.classList.add('hidden');
      resultOverlay.classList.add('hidden');
      spawnFishes();
      renderAll();
      animationId = requestAnimationFrame(update);
    }

    function finishRound() {
      state = 'result';
      cancelAnimationFrame(animationId);

      const resultTitleImage = document.getElementById('resultTitleImage');

      if (score >= 1000) {
        resultTitleImage.src = './assets/resultado-fartura.png';
        resultTitleImage.alt = 'Quanta fartura!';
      } else {
        resultTitleImage.src = './assets/resultado-fraca.png';
        resultTitleImage.alt = 'Pescaria Fraca!';
      }

      normalCountEl.textContent = normalCaught;
      goldCountEl.textContent = goldCaught;
      finalScoreEl.textContent = score;
      resultOverlay.classList.remove('hidden');
      renderAll();
    }

    function setTargetFromClientPosition(clientX, clientY) {
      const rect = game.getBoundingClientRect();
      targetX = clamp(clientX - rect.left, 22, gameWidth - 22);

      if (state === 'up') {
        const pointerScreenY = clientY - rect.top;
        const baseHookScreenY = hookWorldY - cameraY;
        targetVisualOffsetY = clamp(pointerScreenY - baseHookScreenY, -config.verticalControlRange, config.verticalControlRange);
        verticalControlActive = true;
      }
    }

    game.addEventListener('mousemove', event => {
      if (state === 'down' || state === 'up') setTargetFromClientPosition(event.clientX, event.clientY);
    });

    game.addEventListener('touchstart', event => {
      if (event.touches[0]) setTargetFromClientPosition(event.touches[0].clientX, event.touches[0].clientY);
    }, { passive: true });

    game.addEventListener('touchmove', event => {
      if (event.touches[0]) setTargetFromClientPosition(event.touches[0].clientX, event.touches[0].clientY);
    }, { passive: true });

    window.addEventListener('keydown', event => {
      if (state !== 'down' && state !== 'up') return;
      if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') targetX -= 52;
      if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') targetX += 52;
      if (state === 'up' && (event.key === 'ArrowUp' || event.key.toLowerCase() === 'w')) {
        targetVisualOffsetY = clamp(targetVisualOffsetY - 45, -config.verticalControlRange, config.verticalControlRange);
        verticalControlActive = true;
      }
      if (state === 'up' && (event.key === 'ArrowDown' || event.key.toLowerCase() === 's')) {
        targetVisualOffsetY = clamp(targetVisualOffsetY + 45, -config.verticalControlRange, config.verticalControlRange);
        verticalControlActive = true;
      }
      targetX = clamp(targetX, 22, gameWidth - 22);
    });

    startBtn.addEventListener('click', startRound);
    restartBtn.addEventListener('click', startRound);
    window.addEventListener('resize', resize);

    resize();
    renderAll();
  </script>
</body>
</html>
